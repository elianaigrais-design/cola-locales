<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cola de procesamiento</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: rgba(255,255,255,0.08); --border-strong: rgba(255,255,255,0.15);
    --text: #e8eaf0; --text-muted: #7a7f96;
    --accent: #4f7cff; --accent-bg: rgba(79,124,255,0.12); --accent-border: rgba(79,124,255,0.35);
    --success: #22c97a; --success-bg: rgba(34,201,122,0.10); --success-border: rgba(34,201,122,0.30);
    --warning: #f5a623; --warning-bg: rgba(245,166,35,0.10); --warning-border: rgba(245,166,35,0.30);
    --danger: #ff5f5f; --danger-bg: rgba(255,95,95,0.10); --danger-border: rgba(255,95,95,0.30);
    --radius: 12px; --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  .header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(15,17,23,0.95); backdrop-filter: blur(8px); z-index: 10; }
  .header-title { font-size: 15px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; background: var(--bg); }
  .tab { padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .content { padding: 16px 20px; max-width: 480px; margin: 0 auto; }

  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; }
  .stat-val { font-size: 22px; font-weight: 700; }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .stat-card.blue .stat-val { color: var(--accent); }
  .stat-card.green .stat-val { color: var(--success); }

  .banner { border-radius: var(--radius); padding: 14px 16px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
  .banner.procesando { background: var(--accent-bg); border: 1px solid var(--accent-border); }
  .banner-nombre { font-size: 15px; font-weight: 600; color: var(--accent); }
  .banner-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  .queue-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: border-color 0.2s; }
  .queue-item.active { border-color: var(--accent-border); background: var(--accent-bg); }
  .queue-item.done { opacity: 0.45; }
  .queue-item.error-item { border-color: var(--danger-border); background: var(--danger-bg); }

  .pos-num { width: 30px; height: 30px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border-strong); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; color: var(--text-muted); }
  .queue-item.active .pos-num { background: var(--accent); border-color: var(--accent); color: #fff; }
  .queue-item.done .pos-num { background: var(--success-bg); border-color: var(--success-border); color: var(--success); }
  .queue-item.error-item .pos-num { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger); }

  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .queue-item.active .item-name { color: var(--accent); }
  .queue-item.error-item .item-name { color: var(--danger); }
  .item-actions { display: flex; gap: 6px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }

  .badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .badge.done { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
  .badge.next { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); }
  .badge.err { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }

  .btn { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border-strong); background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: var(--font); }
  .btn:hover { background: var(--surface2); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { opacity: 0.88; }
  .btn.success { background: var(--success-bg); border-color: var(--success-border); color: var(--success); }
  .btn.danger { color: var(--danger); border-color: var(--danger-border); }
  .btn.danger:hover { background: var(--danger-bg); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn.icon-only { padding: 6px 9px; }

  .add-row { display: flex; gap: 8px; margin-top: 14px; }
  .add-row input { flex: 1; height: 42px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius); color: var(--text); font-size: 14px; padding: 0 14px; outline: none; font-family: var(--font); }
  .add-row input::placeholder { color: var(--text-muted); }
  .add-row input:focus { border-color: var(--accent); }
  .add-row .btn { height: 42px; font-size: 14px; padding: 0 18px; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }
  .empty .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  hr.divider { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; font-size: 13px; }
  .hist-nombre { font-weight: 600; }
  .hist-tiempo { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
  .hist-dur { font-size: 12px; font-weight: 600; color: var(--success); }

  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 12px 20px; font-size: 13px; z-index: 100; opacity: 0; transition: opacity 0.2s; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; }

  /* ── PANTALLA INICIO ── */
  .inicio-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .inicio-logo { font-size: 40px; margin-bottom: 16px; }
  .inicio-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
  .inicio-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 40px; text-align: center; }
  .inicio-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  .inicio-btn { height: 60px; border-radius: 16px; font-size: 16px; font-weight: 600; cursor: pointer; border: 1px solid var(--border-strong); font-family: var(--font); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .inicio-btn.local { background: var(--accent); border-color: var(--accent); color: #fff; }
  .inicio-btn.local:hover { opacity: 0.88; }
  .inicio-btn.admin { background: var(--surface); color: var(--text-muted); }
  .inicio-btn.admin:hover { background: var(--surface2); color: var(--text); }

  /* ── PIN MODAL ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal { background: var(--surface); border: 1px solid var(--border-strong); border-radius: 20px; padding: 32px 28px; width: 320px; text-align: center; }
  .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--border-strong); transition: all 0.15s; }
  .pin-dot.filled { background: var(--accent); border-color: var(--accent); }
  .pin-dot.error { background: var(--danger); border-color: var(--danger); }
  .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .pin-btn { height: 56px; font-size: 20px; font-weight: 600; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface2); color: var(--text); cursor: pointer; transition: all 0.1s; font-family: var(--font); }
  .pin-btn:hover { background: rgba(79,124,255,0.15); border-color: var(--accent-border); }
  .pin-btn:active { transform: scale(0.94); }
  .pin-btn.del { font-size: 16px; color: var(--text-muted); }
  .pin-error { font-size: 13px; color: var(--danger); margin-top: -12px; margin-bottom: 12px; min-height: 18px; }
  .pin-back { margin-top: 16px; font-size: 13px; color: var(--text-muted); cursor: pointer; background: none; border: none; font-family: var(--font); }
  .pin-back:hover { color: var(--text); }

  /* ── SELECTOR DE LOCAL ── */
  .selector-page { max-width: 480px; margin: 0 auto; padding: 20px; }
  .selector-page h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .selector-page p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); margin-bottom: 10px; }
  .locales-grid { display: flex; flex-direction: column; gap: 8px; margin-bottom: 4px; }
  .local-btn { background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 16px 18px; text-align: left; cursor: pointer; transition: all 0.15s; font-family: var(--font); font-size: 15px; font-weight: 600; color: var(--text); display: flex; align-items: center; justify-content: space-between; }
  .local-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
  .local-btn .arrow { color: var(--text-muted); font-size: 18px; }
  .local-btn .estado-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
  .local-btn .estado-procesando { background: var(--accent-bg); color: var(--accent); border: 1px solid var(--accent-border); }
  .local-btn .estado-error { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
  .manual-form { margin-top: 4px; }
  .manual-form input { width: 100%; height: 48px; background: var(--surface); border: 1px solid var(--border-strong); border-radius: var(--radius); color: var(--text); font-size: 15px; padding: 0 16px; font-family: var(--font); outline: none; margin-bottom: 10px; }
  .manual-form input:focus { border-color: var(--accent); }
  .manual-form .btn { width: 100%; height: 48px; font-size: 15px; }

  /* ── VISTA ENCARGADO ── */
  .encargado-page { padding: 20px; max-width: 480px; margin: 0 auto; }
  .turno-card { border-radius: 16px; padding: 28px 24px; text-align: center; margin-bottom: 16px; }
  .turno-card.mi-turno { background: var(--accent-bg); border: 2px solid var(--accent-border); }
  .turno-card.espera { background: var(--surface); border: 1px solid var(--border); }
  .turno-card.listo { background: var(--success-bg); border: 2px solid var(--success-border); }
  .turno-card.con-error { background: var(--danger-bg); border: 2px solid var(--danger-border); }
  .turno-label { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 8px; }
  .turno-nombre { font-size: 28px; font-weight: 700; margin-bottom: 6px; }
  .turno-sub { font-size: 13px; color: var(--text-muted); }
  .pos-grande { font-size: 64px; font-weight: 800; color: var(--accent); line-height: 1; margin: 10px 0; }
  .siguiente-card { background: var(--surface); border: 1px solid var(--warning-border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px; }
  .sig-label { font-size: 11px; color: var(--warning); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
  .sig-nombre { font-size: 15px; font-weight: 600; margin-top: 2px; }
  .btn-row { display: flex; gap: 10px; margin-top: 10px; }
  .btn-row .btn { flex: 1; height: 56px; font-size: 15px; border-radius: var(--radius); }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- ── PANTALLA INICIO ── -->
<div id="view-inicio">
  <div class="inicio-page">
    <div class="inicio-logo">🏪</div>
    <div class="inicio-title">Cola de procesamiento</div>
    <div class="inicio-sub">Los W</div>
    <div class="inicio-btns">
      <button class="inicio-btn local" onclick="mostrarSelector()">
        Soy un local
      </button>
      <button class="inicio-btn admin" onclick="mostrarPinModal()">
        Admin
      </button>
    </div>
  </div>
</div>

<!-- ── PIN MODAL ── -->
<div class="modal-overlay" id="pin-modal" style="display:none">
  <div class="modal">
    <h2>Panel admin</h2>
    <p>Ingresá el PIN para acceder</p>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn del" onclick="pinPress('C')">✕</button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinPress('⌫')">⌫</button>
    </div>
    <button class="pin-back" onclick="cerrarPin()">← Volver</button>
  </div>
</div>

<!-- ── SELECTOR DE LOCAL ── -->
<div id="view-selector" style="display:none">
  <div class="header">
    <div>
      <div class="header-title">¿Quién sos?</div>
      <div class="header-sub"><span class="live-dot"></span>en vivo</div>
    </div>
    <button class="btn" onclick="volverInicio()">← Volver</button>
  </div>
  <div class="selector-page">
    <div class="section-label">Locales en cola hoy</div>
    <div class="locales-grid" id="locales-en-cola"></div>
    <hr class="divider">
    <div class="section-label">No estoy en la cola — anotarme</div>
    <div class="manual-form">
      <input type="text" id="input-mi-local" placeholder="Nombre de tu local" maxlength="40" />
      <button class="btn primary" onclick="anotarme()">Anotarme al final de la cola</button>
    </div>
  </div>
</div>

<!-- ── VISTA ENCARGADO ── -->
<div id="view-encargado" style="display:none">
  <div class="header">
    <div>
      <div class="header-title" id="enc-local-nombre">–</div>
      <div class="header-sub"><span class="live-dot"></span>en vivo</div>
    </div>
    <button class="btn" onclick="salirEncargado()">Salir</button>
  </div>
  <div class="encargado-page" id="enc-content"></div>
</div>

<!-- ── ADMIN ── -->
<div id="view-admin" style="display:none">
  <div class="header">
    <div>
      <div class="header-title">Panel admin</div>
      <div class="header-sub"><span class="live-dot"></span>en vivo</div>
    </div>
    <button class="btn" onclick="salirAdmin()">Salir</button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('cola', this)">Cola</div>
    <div class="tab" onclick="switchTab('historia', this)">Historial</div>
  </div>
  <div id="tab-cola" class="content">
    <div id="loading-cola" class="loading"><div class="spinner"></div>Cargando...</div>
    <div id="cola-content" style="display:none">
      <div class="stats">
        <div class="stat-card"><div class="stat-val" id="s-total">0</div><div class="stat-label">total hoy</div></div>
        <div class="stat-card blue"><div class="stat-val" id="s-pendientes">0</div><div class="stat-label">esperando</div></div>
        <div class="stat-card green"><div class="stat-val" id="s-listos">0</div><div class="stat-label">listos</div></div>
      </div>
      <div id="banner-procesando" style="display:none" class="banner procesando">
        <div style="font-size:20px">⚙️</div>
        <div>
          <div class="banner-nombre" id="banner-nombre">–</div>
          <div class="banner-sub">procesando ahora</div>
        </div>
      </div>
      <div id="lista-cola"></div>
      <hr class="divider">
      <div class="add-row">
        <input type="text" id="input-nuevo" placeholder="Nombre del local" maxlength="40" />
        <button class="btn primary" onclick="agregarLocal()">+ Agregar</button>
      </div>
    </div>
  </div>
  <div id="tab-historia" class="content" style="display:none">
    <div id="lista-historia"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://vxyccplyecbfvyxspaxw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_vATJV2Rzlw6UEoUcXEktDw_sAqGDchI';
const ADMIN_PIN = '7294';
const TG_TOKEN = '8920662334:AAH6BliDisaGF-UhdnVBL6IFzxJWCH1VBWM';
const TG_CHAT  = '-5416250983';

async function notificarTelegram(mensaje) {
  try {
    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TG_CHAT, text: mensaje, parse_mode: 'HTML' })
    });
  } catch(e) { console.error('Telegram error:', e); }
}

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let colaData = [];
let miLocalId = null;
let miLocalNombre = '';
let pinIngresado = '';
let subscription = null;

// PERSISTENCIA
function guardarEstado(vista, id, nombre) {
  try {
    localStorage.setItem('cola_vista', vista);
    localStorage.setItem('cola_local_id', id || '');
    localStorage.setItem('cola_local_nombre', nombre || '');
  } catch(e) {}
}

function restaurarEstado() {
  try {
    const vista = localStorage.getItem('cola_vista');
    const id = localStorage.getItem('cola_local_id');
    const nombre = localStorage.getItem('cola_local_nombre');
    if (vista === 'encargado' && id) {
      miLocalId = id;
      miLocalNombre = nombre;
      document.getElementById('enc-local-nombre').textContent = nombre;
      show('view-encargado');
      return true;
    }
    if (vista === 'selector') {
      show('view-selector');
      return true;
    }
    if (vista === 'admin') {
      show('view-admin');
      return true;
    }
  } catch(e) {}
  return false;
}

// ── NAVEGACIÓN ────────────────────────────────────────────────────────────────

function show(id) {
  ['view-inicio','view-selector','view-encargado','view-admin'].forEach(v => {
    document.getElementById(v).style.display = v === id ? 'block' : 'none';
  });
}

function mostrarSelector() {
  guardarEstado('selector', '', '');
  show('view-selector');
  cargarCola();
  suscribirse();
}

function mostrarPinModal() {
  document.getElementById('pin-modal').style.display = 'flex';
}

function cerrarPin() {
  document.getElementById('pin-modal').style.display = 'none';
  pinIngresado = '';
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.remove('filled','error');
  }
  document.getElementById('pin-error').textContent = '';
}

function volverInicio() {
  guardarEstado('inicio', '', '');
  show('view-inicio');
}

function salirEncargado() {
  miLocalId = null;
  miLocalNombre = '';
  guardarEstado('selector', '', '');
  show('view-selector');
  renderLocalesEnCola();
}

function salirAdmin() {
  guardarEstado('inicio', '', '');
  show('view-inicio');
}

// ── PIN ───────────────────────────────────────────────────────────────────────

function pinPress(val) {
  const err = document.getElementById('pin-error');
  err.textContent = '';
  if (val === 'C') { pinIngresado = ''; }
  else if (val === '⌫') { pinIngresado = pinIngresado.slice(0, -1); }
  else if (pinIngresado.length < 4) { pinIngresado += val; }

  for (let i = 0; i < 4; i++) {
    const d = document.getElementById('d' + i);
    d.classList.toggle('filled', i < pinIngresado.length);
    d.classList.remove('error');
  }

  if (pinIngresado.length === 4) {
    if (pinIngresado === ADMIN_PIN) {
      cerrarPin();
      guardarEstado('admin', '', '');
      show('view-admin');
      cargarCola();
      suscribirse();
    } else {
      for (let i = 0; i < 4; i++) document.getElementById('d' + i).classList.add('error');
      err.textContent = 'PIN incorrecto';
      setTimeout(() => {
        pinIngresado = '';
        for (let i = 0; i < 4; i++) document.getElementById('d' + i).classList.remove('filled','error');
        err.textContent = '';
      }, 900);
    }
  }
}

document.addEventListener('keydown', e => {
  if (document.getElementById('pin-modal').style.display !== 'none') {
    if (e.key >= '0' && e.key <= '9') pinPress(e.key);
    else if (e.key === 'Backspace') pinPress('⌫');
    else if (e.key === 'Escape') cerrarPin();
  }
});

// ── DATA ──────────────────────────────────────────────────────────────────────

async function cargarCola() {
  const hoy = new Date().toISOString().split('T')[0];
  const { data, error } = await db.from('cola').select('*').eq('fecha', hoy)
    .order('orden', { ascending: true, nullsFirst: false })
    .order('entro_a_las', { ascending: true });
  if (error) { console.error(error); return; }
  colaData = data || [];
  renderCola();
  renderLocalesEnCola();
  if (miLocalId) renderEncargado();
}

function suscribirse() {
  if (subscription) subscription.unsubscribe();
  subscription = db.channel('cola-realtime')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'cola' }, () => cargarCola())
    .subscribe();
}

// ── RENDER SELECTOR ───────────────────────────────────────────────────────────

function renderLocalesEnCola() {
  const lista = document.getElementById('locales-en-cola');
  if (!lista) return;
  const activos = colaData.filter(r => r.estado !== 'listo');
  if (activos.length === 0) {
    lista.innerHTML = '<p style="font-size:13px;color:var(--text-muted);margin-bottom:12px">No hay locales en cola ahora.</p>';
    return;
  }
  lista.innerHTML = activos.map(item => {
    let badge = '';
    if (item.estado === 'procesando') badge = `<span class="estado-badge estado-procesando">procesando</span>`;
    if (item.estado === 'error') badge = `<span class="estado-badge estado-error">error</span>`;
    return `
      <button class="local-btn" onclick="elegirLocal('${item.id}', '${item.nombre.replace(/'/g,"\\'")}')">
        <span>${item.nombre} ${badge}</span>
        <span class="arrow">›</span>
      </button>
    `;
  }).join('');
}

// ── RENDER ADMIN ──────────────────────────────────────────────────────────────

function renderCola() {
  const loadingEl = document.getElementById('loading-cola');
  const contentEl = document.getElementById('cola-content');
  if (!loadingEl || !contentEl) return;
  loadingEl.style.display = 'none';
  contentEl.style.display = 'block';

  const pendientes = colaData.filter(r => r.estado === 'pendiente');
  const procesando = colaData.filter(r => r.estado === 'procesando');
  const listos     = colaData.filter(r => r.estado === 'listo');
  const errores    = colaData.filter(r => r.estado === 'error');

  document.getElementById('s-total').textContent = colaData.length;
  document.getElementById('s-pendientes').textContent = pendientes.length + errores.length;
  document.getElementById('s-listos').textContent = listos.length;

  const banner = document.getElementById('banner-procesando');
  if (procesando.length > 0) {
    banner.style.display = 'flex';
    document.getElementById('banner-nombre').textContent = procesando[0].nombre;
  } else {
    banner.style.display = 'none';
  }

  const ordered = [...procesando, ...pendientes, ...errores, ...listos];
  const lista = document.getElementById('lista-cola');
  if (ordered.length === 0) {
    lista.innerHTML = '<div class="empty"><div class="icon">📋</div>No hay locales en la cola hoy</div>';
    renderHistorial(); return;
  }

  let pos = 1;
  lista.innerHTML = ordered.map(item => {
    let posHtml, actionsHtml, extraBadge = '', itemClass = '';
    if (item.estado === 'listo') {
      posHtml = '✓'; itemClass = 'done';
      actionsHtml = `<span class="badge done">Listo</span>`;
    } else if (item.estado === 'error') {
      posHtml = '!'; itemClass = 'error-item';
      actionsHtml = `<span class="badge err">Error</span><button class="btn danger icon-only" onclick="quitarLocal('${item.id}')">✕</button>`;
    } else if (item.estado === 'procesando') {
      posHtml = pos++; itemClass = 'active';
      actionsHtml = `<button class="btn success" onclick="marcarListo('${item.id}')">Finalizar</button>`;
    } else {
      const p = pos++;
      if (p === 1) extraBadge = '<span class="badge next" style="margin-left:6px">siguiente</span>';
      posHtml = p;
      actionsHtml = `
        <button class="btn icon-only" onclick="subirPuesto('${item.id}')" title="Subir">↑</button>
        <button class="btn danger icon-only" onclick="quitarLocal('${item.id}')">✕</button>
      `;
    }
    const hora = new Date(item.entro_a_las).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    return `
      <div class="queue-item ${itemClass}">
        <div class="pos-num">${posHtml}</div>
        <div class="item-info">
          <div class="item-name">${item.nombre}${extraBadge}</div>
          <div class="item-meta">Entró ${hora}</div>
        </div>
        <div class="item-actions">${actionsHtml}</div>
      </div>
    `;
  }).join('');
  renderHistorial();
}

function renderHistorial() {
  const lista = document.getElementById('lista-historia');
  if (!lista) return;
  const listos = colaData.filter(r => r.estado === 'listo' && r.termino_a_las);
  if (listos.length === 0) {
    lista.innerHTML = '<div class="empty"><div class="icon">📈</div>Sin historial todavía hoy</div>';
    return;
  }
  lista.innerHTML = listos.map(item => {
    const inicio = item.empezo_a_las ? new Date(item.empezo_a_las) : null;
    const fin = new Date(item.termino_a_las);
    let durStr = '';
    if (inicio) { const mins = Math.round((fin - inicio) / 60000); durStr = `${mins} min`; }
    const horaFin = fin.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    const tuvoError = item.tuvo_error ? ' <span class="badge err" style="font-size:10px">tuvo error</span>' : '';
    return `
      <div class="hist-item">
        <div><div class="hist-nombre">${item.nombre}${tuvoError}</div><div class="hist-tiempo">Finalizó ${horaFin}</div></div>
        ${durStr ? `<div class="hist-dur">${durStr}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ── ACCIONES ADMIN ────────────────────────────────────────────────────────────

async function agregarLocal() {
  const input = document.getElementById('input-nuevo');
  const nombre = input.value.trim();
  if (!nombre) return;
  const maxOrden = colaData.reduce((m, r) => Math.max(m, r.orden || 0), 0);
  await db.from('cola').insert({ nombre, estado: 'pendiente', orden: maxOrden + 1 });
  input.value = '';
  toast('✓ ' + nombre + ' agregado');
}

async function marcarListo(id) {
  await db.from('cola').update({ estado: 'listo', termino_a_las: new Date().toISOString() }).eq('id', id);
  const siguiente = colaData.find(r => r.estado === 'pendiente');
  if (siguiente) {
    await db.from('cola').update({ estado: 'procesando', empezo_a_las: new Date().toISOString() }).eq('id', siguiente.id);
    notificarTelegram(`🟢 <b>${siguiente.nombre}</b> — ¡es tu turno!\n\nEntrá a cola-locales.vercel.app y tocá "Empezar a procesar".`);
  }
  toast('✓ Listo.');
}

async function subirPuesto(id) {
  const pendientes = colaData.filter(r => r.estado === 'pendiente');
  const idx = pendientes.findIndex(r => r.id === id);
  if (idx <= 0) return;
  const prev = pendientes[idx - 1], curr = pendientes[idx];
  await Promise.all([
    db.from('cola').update({ orden: curr.orden }).eq('id', prev.id),
    db.from('cola').update({ orden: prev.orden }).eq('id', curr.id)
  ]);
}

async function quitarLocal(id) {
  const item = colaData.find(r => r.id === id);
  if (!confirm(`¿Quitar a ${item?.nombre}?`)) return;
  await db.from('cola').delete().eq('id', id);
  toast('Eliminado');
}

// ── ENCARGADO ─────────────────────────────────────────────────────────────────

function elegirLocal(id, nombre) {
  miLocalId = id;
  miLocalNombre = nombre;
  guardarEstado('encargado', id, nombre);
  document.getElementById('enc-local-nombre').textContent = nombre;
  show('view-encargado');
  cargarCola();
  suscribirse();
}

async function anotarme() {
  const input = document.getElementById('input-mi-local');
  const nombre = input.value.trim();
  if (!nombre) return;
  const maxOrden = colaData.reduce((m, r) => Math.max(m, r.orden || 0), 0);
  const { data, error } = await db.from('cola').insert({ nombre, estado: 'pendiente', orden: maxOrden + 1 }).select().single();
  if (!error && data) { input.value = ''; elegirLocal(data.id, data.nombre); toast('✓ Anotado en la cola'); }
}

function renderEncargado() {
  const content = document.getElementById('enc-content');
  if (!content || !miLocalId) return;
  const mi = colaData.find(r => r.id === miLocalId);

  if (!mi) {
    content.innerHTML = `
      <div class="turno-card espera" style="margin-top:24px">
        <div class="turno-nombre" style="font-size:18px">Ya no estás en la cola</div>
      </div>
      <button class="btn" style="width:100%;height:44px;margin-top:12px" onclick="salirEncargado()">Volver</button>
    `; return;
  }

  const id = mi.id;

  if (mi.estado === 'error') {
    content.innerHTML = `
      <div class="turno-card con-error" style="margin-top:24px">
        <div class="turno-label">⚠️ Tuviste un error</div>
        <div class="turno-nombre" style="color:var(--danger)">${mi.nombre}</div>
        <div class="turno-sub" style="margin-top:8px">Fuiste movido al final de la cola</div>
      </div>
      <button class="btn primary" style="width:100%;height:52px;margin-top:10px;font-size:15px" onclick="encargadoReintento('${id}')">
        Listo para reintentar
      </button>
      <button class="btn" style="width:100%;height:44px;margin-top:8px" onclick="salirEncargado()">Salir de la cola</button>
    `; return;
  }

  if (mi.estado === 'listo') {
    content.innerHTML = `
      <div class="turno-card listo" style="margin-top:24px">
        <div class="turno-label">✓ Procesado</div>
        <div class="turno-nombre" style="color:var(--success)">${mi.nombre}</div>
        <div class="turno-sub" style="margin-top:8px">¡Todo listo por hoy!</div>
      </div>
      <button class="btn" style="width:100%;height:44px;margin-top:16px" onclick="salirEncargado()">← Ver la cola</button>
    `; return;
  }

  if (mi.estado === 'procesando') {
    content.innerHTML = `
      <div class="turno-card mi-turno" style="margin-top:24px">
        <div class="turno-label">⚙️ Es tu turno</div>
        <div class="turno-nombre" style="color:var(--accent)">${mi.nombre}</div>
        <div class="turno-sub" style="margin-top:8px">Podés empezar a procesar ahora</div>
      </div>
      <div class="btn-row">
        <button class="btn success" onclick="encargadoFinalizar('${id}')">✓ Terminé</button>
        <button class="btn danger" onclick="encargadoError('${id}')">⚠️ Tuve un error</button>
      </div>
    `; return;
  }

  // Pendiente
  const pendientes = colaData.filter(r => r.estado === 'pendiente');
  const procesando = colaData.filter(r => r.estado === 'procesando');
  const miPos = pendientes.findIndex(r => r.id === miLocalId);
  const esSiguiente = procesando.length === 0 && miPos === 0;

  let nextCard = '';
  if (procesando.length > 0) {
    nextCard = `<div class="siguiente-card"><div class="sig-label">Procesando ahora</div><div class="sig-nombre">${procesando[0].nombre}</div></div>`;
  }

  content.innerHTML = `
    ${nextCard}
    <div class="turno-card ${esSiguiente ? 'mi-turno' : 'espera'}" style="margin-top:${nextCard ? '8px' : '24px'}">
      <div class="turno-label">${esSiguiente ? '🟡 Sos el siguiente' : 'Tu posición en la cola'}</div>
      <div class="pos-grande">${miPos + 1}</div>
      <div class="turno-nombre">${mi.nombre}</div>
      <div class="turno-sub" style="margin-top:8px">
        ${miPos === 0 && procesando.length === 0 ? 'Sos el primero — empezá cuando estés listo'
          : miPos === 0 ? 'Sos el siguiente cuando termine el local actual'
          : `Hay ${miPos} local${miPos !== 1 ? 'es' : ''} antes que vos`}
      </div>
    </div>
    ${esSiguiente ? `
    <button class="btn primary" style="width:100%;height:56px;margin-top:10px;font-size:16px" onclick="encargadoEmpezar('${id}')">
      Empezar a procesar
    </button>` : ''}
  `;
}

async function encargadoEmpezar(id) {
  const { error } = await db.from('cola').update({ estado: 'procesando', empezo_a_las: new Date().toISOString() }).eq('id', id);
  if (error) { toast('Error al actualizar, intentá de nuevo'); console.error(error); return; }
  const item = colaData.find(r => r.id === id);
  if (item) { item.estado = 'procesando'; item.empezo_a_las = new Date().toISOString(); }
  toast('¡Arrancaste!');
  renderEncargado();
}

async function encargadoFinalizar(id) {
  const { error } = await db.from('cola').update({ estado: 'listo', termino_a_las: new Date().toISOString() }).eq('id', id);
  if (error) { toast('Error al guardar, intentá de nuevo'); return; }
  const siguiente = colaData.find(r => r.estado === 'pendiente' && r.id !== id);
  if (siguiente) await db.from('cola').update({ estado: 'procesando', empezo_a_las: new Date().toISOString() }).eq('id', siguiente.id);
  const item = colaData.find(r => r.id === id);
  if (item) { item.estado = 'listo'; item.termino_a_las = new Date().toISOString(); }
  if (siguiente) {
    const sig = colaData.find(r => r.id === siguiente.id);
    if (sig) { sig.estado = 'procesando'; sig.empezo_a_las = new Date().toISOString(); }
    notificarTelegram(`🟢 <b>${sig.nombre}</b> — ¡es tu turno!\n\nEntrá a cola-locales.vercel.app y tocá "Empezar a procesar".`);
  }
  toast('✓ ¡Procesado!');
  renderEncargado();
}

async function encargadoError(id) {
  const maxOrden = colaData.reduce((m, r) => Math.max(m, r.orden || 0), 0);
  await db.from('cola').update({ estado: 'error', orden: maxOrden + 1, tuvo_error: true }).eq('id', id);
  const siguiente = colaData.find(r => r.estado === 'pendiente' && r.id !== id);
  if (siguiente) await db.from('cola').update({ estado: 'procesando', empezo_a_las: new Date().toISOString() }).eq('id', siguiente.id);
  const item = colaData.find(r => r.id === id);
  if (item) { item.estado = 'error'; item.orden = maxOrden + 1; item.tuvo_error = true; }
  if (siguiente) {
    const sig = colaData.find(r => r.id === siguiente.id);
    if (sig) { sig.estado = 'procesando'; sig.empezo_a_las = new Date().toISOString(); }
    notificarTelegram(`🟢 <b>${sig.nombre}</b> — ¡es tu turno!\n\n(El local anterior tuvo un error)\nEntrá a cola-locales.vercel.app y tocá "Empezar a procesar".`);
  }
  toast('⚠️ Fuiste al final de la cola');
  renderEncargado();
}

async function encargadoReintento(id) {
  const maxOrden = colaData.reduce((m, r) => Math.max(m, r.orden || 0), 0);
  await db.from('cola').update({ estado: 'pendiente', orden: maxOrden + 1 }).eq('id', id);
  toast('✓ De vuelta en la cola');
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-cola').style.display = tab === 'cola' ? 'block' : 'none';
  document.getElementById('tab-historia').style.display = tab === 'historia' ? 'block' : 'none';
  if (tab === 'historia') renderHistorial();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('input-nuevo')?.addEventListener('keydown', e => { if (e.key === 'Enter') agregarLocal(); });
document.getElementById('input-mi-local')?.addEventListener('keydown', e => { if (e.key === 'Enter') anotarme(); });

// Arrancar suscripcion global siempre, restaurar estado al cargar
suscribirse();
cargarCola();
if (!restaurarEstado()) {
  show('view-inicio');
}
</script>
</body>
